services:
  postgres:
    image: postgres:16
    container_name: preztiaos-pg
    environment:
      POSTGRES_USER: preztia
      POSTGRES_PASSWORD: preztia
      POSTGRES_DB: preztiaos
    # Host 5442 → contenedor 5432: el 5432 del host lo ocupa otro proyecto (antigravity_db).
    ports: ["5442:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preztia -d preztiaos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: preztiaos-redis
    # Host 6389 → contenedor 6379: el 6379 del host lo ocupa otro proyecto (antigravity_redis).
    ports: ["6389:6379"]

  minio:
    image: minio/minio:latest
    container_name: preztiaos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
